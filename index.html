
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>情绪即设计</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Space+Mono&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #F8F9FA;
        --paper: #FFFFFF;
        --ink: #111111;
        --muted: #6B7280;
        --line: rgba(17, 17, 17, 0.08);
        --accent: #0057FF;
        --accent-soft: rgba(0, 87, 255, 0.12);
      }
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        color: var(--ink);
        font-family: 'Space Grotesk', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        overflow-x: hidden;
      }
      .font-mono {
        font-family: 'Space Mono', 'Noto Sans SC', monospace;
      }
      .neon-glow {
        box-shadow: 0 10px 30px rgba(0, 87, 255, 0.25);
      }
      .purple-glow {
        box-shadow: 0 8px 24px rgba(17, 17, 17, 0.08);
      }
      .glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--line);
        box-shadow: 0 6px 20px rgba(17, 17, 17, 0.06);
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent);
        border-radius: 10px;
      }
    </style>
